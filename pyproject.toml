# Root pyproject.toml — shared tooling config (ruff, black, isort).
# Does NOT define a package. Each subproject has its own requirements.txt.

[tool.ruff]
line-length = 120
target-version = "py310"
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.black]
line-length = 120
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 120
